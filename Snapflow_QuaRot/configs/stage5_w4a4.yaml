name: stage5_w4a4
pretrained_path: /data/jameskimh/james_lebero_pretrained/pi05_libero_finetuned
calib_stats_path: artifacts/stage0_calib_stats.pt
output_dir: results/stage5

policy:
  n_action_steps: 10
  num_inference_steps: 10

eval:
  task: libero_10
  n_episodes: 100
  batch_size: 1
  device: cuda
  use_amp: false
  start_seed: 0

quarot:
  enabled: true
  scope: llm+dit
  r1: true
  r2: true
  r3: true
  r4: true             # online Hadamard (R4) at down_proj inputs
  fuse_rmsnorm: true

ohb:
  enabled: true
  top_k_pct: 5.0
  metric: kurtosis
  manifest_path: artifacts/stage4_ohb_manifest.json

adaln:
  auto_detect: true

w4a4:
  enabled: true
  weight_bits: 4
  act_bits: 4
  group_size: 128
  online_hadamard: false  # R4 already applied by quarot.r4 via RotatedLinear wrapper
  quant_state_path: artifacts/stage5_quant_state.pt
